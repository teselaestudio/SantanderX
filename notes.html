<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notas del Orador - Tesela Estudio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #121212;
      --bg-card: #1c1c1c;
      --border-color: #2a2a2a;
      --text-light: #e0e0e0;
      --text-muted: #888888;
      --accent: #10b981;
      --accent-hover: #34d399;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: var(--bg-dark);
      color: var(--text-light);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 20px;
    }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 20px;
    }
    
    .logo-area {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      color: var(--accent);
    }
    
    .status-badge {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: var(--accent);
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
      flex-grow: 1;
      overflow: hidden;
      margin-bottom: 20px;
    }
    
    .notes-panel {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .panel-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 15px;
    }
    
    .notes-content-scroll {
      flex-grow: 1;
      overflow-y: auto;
      font-size: 1.45rem;
      line-height: 1.7;
      color: #ffffff;
      padding-right: 10px;
      font-weight: 300;
    }
    
    .notes-content-scroll p {
      margin-bottom: 15px;
    }
    
    .notes-content-scroll strong {
      color: var(--accent);
      font-weight: 600;
    }
    
    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow: hidden;
    }
    
    .info-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .info-title {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
    }
    
    .info-value {
      font-family: 'Outfit', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: #ffffff;
    }
    
    .next-preview-box {
      flex-grow: 1;
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .next-notes-preview {
      margin-top: 10px;
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text-muted);
      overflow-y: auto;
      flex-grow: 1;
      padding-right: 5px;
    }
    
    .footer-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 15px;
      border-top: 1px solid var(--border-color);
    }
    
    .navigation-controls {
      display: flex;
      gap: 15px;
    }
    
    .nav-btn {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-light);
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
    }
    
    .nav-btn:hover {
      background-color: var(--accent);
      border-color: var(--accent);
      color: var(--bg-dark);
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.25);
    }
    
    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      box-shadow: none;
    }
    
    .nav-btn:disabled:hover {
      background-color: var(--bg-card);
      border-color: var(--border-color);
      color: var(--text-light);
    }
    
    .slide-index-indicator {
      font-size: 1rem;
      color: var(--text-muted);
    }
    
    #current-num {
      color: var(--accent);
      font-weight: 600;
      font-size: 1.1rem;
    }

    /* Scrollbar Style */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(224, 224, 224, 0.1);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-area">TESELA ESTUDIO — NOTAS DE VISTA</div>
    <div class="status-badge" id="sync-status">Sincronizado</div>
  </header>

  <div class="main-grid">
    <!-- Notes Panel -->
    <div class="notes-panel">
      <div class="panel-label">Texto a Exponer (Diapositiva Actual)</div>
      <div class="notes-content-scroll" id="notes-text">
        Cargando notas de la diapositiva...
      </div>
    </div>

    <!-- Side Panel -->
    <div class="side-panel">
      <!-- Active Slide Title -->
      <div class="info-card">
        <div class="info-title">Diapositiva Actual</div>
        <div class="info-value" id="current-slide-title">Portada</div>
      </div>
      
      <!-- Next Slide Title -->
      <div class="next-preview-box">
        <div class="info-title">Siguiente Diapositiva</div>
        <div class="info-value" style="margin-bottom:10px;" id="next-slide-title">1. El Origen</div>
        <div class="info-title" style="font-size: 0.7rem; border-top:1px solid #2a2a2a; padding-top:10px;">Inicio de Notas Siguiente:</div>
        <div class="next-notes-preview" id="next-notes-text">
          Cargando vista previa...
        </div>
      </div>
    </div>
  </div>

  <div class="footer-bar">
    <div class="slide-index-indicator">
      Diapositiva <span id="current-num">0</span> de <span id="total-num">0</span>
    </div>
    
    <div class="navigation-controls">
      <button class="nav-btn" id="btn-notes-prev">◀ Anterior</button>
      <button class="nav-btn" id="btn-notes-next">Siguiente ▶</button>
    </div>
  </div>

  <script>
    let currentSlideIndex = 0;
    let totalSlides = 0;
    let notesData = [];
    let titlesData = [];

    const notesTextEl = document.getElementById('notes-text');
    const currentTitleEl = document.getElementById('current-slide-title');
    const nextTitleEl = document.getElementById('next-slide-title');
    const nextNotesEl = document.getElementById('next-notes-text');
    const currentNumEl = document.getElementById('current-num');
    const totalNumEl = document.getElementById('total-num');
    
    const btnPrev = document.getElementById('btn-notes-prev');
    const btnNext = document.getElementById('btn-notes-next');
    const syncStatusEl = document.getElementById('sync-status');

    // Extract Data from Opener
    function initDataFromOpener() {
      if (window.opener) {
        try {
          const mainSlides = Array.from(window.opener.document.querySelectorAll('.slide'));
          totalSlides = mainSlides.length;
          totalNumEl.textContent = totalSlides;
          
          notesData = mainSlides.map(slide => slide.querySelector('.speaker-notes-content').innerHTML);
          titlesData = mainSlides.map(slide => slide.getAttribute('data-title') || 'Sin Título');
          
          syncStatusEl.textContent = "Sincronizado";
          syncStatusEl.style.color = "#10b981";
          syncStatusEl.style.background = "rgba(16, 185, 129, 0.1)";
          syncStatusEl.style.borderColor = "rgba(16, 185, 129, 0.3)";
          
          // Get current state
          const parentIndex = window.opener.localStorage.getItem('tesela_slide_index');
          if (parentIndex !== null) {
            currentSlideIndex = parseInt(parentIndex);
          }
          
          updateDisplay();
        } catch (e) {
          console.error("No se pudo leer el DOM del presentador principal:", e);
          syncStatusEl.textContent = "Error de Conexión";
          syncStatusEl.style.color = "#ff5252";
          syncStatusEl.style.background = "rgba(255, 82, 82, 0.1)";
          syncStatusEl.style.borderColor = "rgba(255, 82, 82, 0.3)";
        }
      } else {
        syncStatusEl.textContent = "Sin Ventana Principal";
        syncStatusEl.style.color = "#ff8c00";
        syncStatusEl.style.background = "rgba(255, 140, 0, 0.1)";
        syncStatusEl.style.borderColor = "rgba(255, 140, 0, 0.3)";
      }
    }

    function updateDisplay() {
      if (totalSlides === 0) return;
      
      currentNumEl.textContent = currentSlideIndex + 1;
      
      // Update Active Slide Notes
      notesTextEl.innerHTML = notesData[currentSlideIndex] || '<p>Sin notas registradas</p>';
      currentTitleEl.textContent = titlesData[currentSlideIndex] || `Diapositiva ${currentSlideIndex + 1}`;
      
      // Update Next Slide Preview
      if (currentSlideIndex + 1 < totalSlides) {
        nextTitleEl.textContent = titlesData[currentSlideIndex + 1];
        // Strip tags and show snippet
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = notesData[currentSlideIndex + 1];
        const plainText = tempDiv.textContent || tempDiv.innerText || "";
        nextNotesEl.textContent = plainText.substring(0, 180) + (plainText.length > 180 ? '...' : '');
      } else {
        nextTitleEl.textContent = "Fin de la Presentación";
        nextNotesEl.textContent = "No hay más diapositivas.";
      }
      
      // Enable/Disable buttons
      btnPrev.disabled = currentSlideIndex === 0;
      btnNext.disabled = currentSlideIndex === totalSlides - 1;
    }

    // Navigation triggers
    function navigate(index) {
      if (index >= 0 && index < totalSlides) {
        currentSlideIndex = index;
        updateDisplay();
        
        // Notify parent
        if (window.opener) {
          window.opener.postMessage({ type: 'navigate', index: currentSlideIndex }, '*');
        }
      }
    }

    btnPrev.addEventListener('click', () => navigate(currentSlideIndex - 1));
    btnNext.addEventListener('click', () => navigate(currentSlideIndex + 1));

    // Handle incoming messages from the main window
    window.addEventListener('message', (e) => {
      if (e.data) {
        if (e.data.type === 'slideChange') {
          currentSlideIndex = e.data.index;
          updateDisplay();
        } else if (e.data.type === 'init') {
          currentSlideIndex = e.data.index;
          initDataFromOpener();
        }
      }
    });

    // Handle storage sync event in case message channel is not active
    window.addEventListener('storage', (e) => {
      if (e.key === 'tesela_slide_index') {
        currentSlideIndex = parseInt(e.newValue);
        updateDisplay();
      }
    });

    // Keyboard controls in presenter window (sends commands back to presentation)
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
        navigate(currentSlideIndex + 1);
      } else if (e.key === 'ArrowLeft' || e.key === 'Backspace' || e.key === 'PageUp') {
        navigate(currentSlideIndex - 1);
      }
    });

    // Run Init
    window.addEventListener('load', () => {
      initDataFromOpener();
      
      // Auto retry connection in case opener took a moment to load
      setTimeout(initDataFromOpener, 500);
    });
  </script>
</body>
</html>
